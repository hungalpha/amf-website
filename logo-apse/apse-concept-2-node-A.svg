<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 200" width="540" height="200" font-family="Montserrat, 'Segoe UI', Arial, sans-serif">
  <!-- CONCEPT 2: Mạng node hệ thống tạo thành chữ A / mũi tên hướng lên -->
  <defs>
    <linearGradient id="g2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#0077B6"/>
      <stop offset="1" stop-color="#48CAE4"/>
    </linearGradient>
  </defs>

  <g transform="translate(30,28)" stroke-linecap="round" stroke-linejoin="round">
    <!-- khung chữ A bằng các đường nối hệ thống -->
    <path d="M70 8 L20 120 M70 8 L120 120 M44 75 L96 75" fill="none" stroke="#0A2A5E" stroke-width="13"/>
    <path d="M70 8 L120 120" fill="none" stroke="url(#g2)" stroke-width="6"/>
    <!-- nodes -->
    <circle cx="70" cy="8" r="11" fill="#00B4D8"/>
    <circle cx="20" cy="120" r="9" fill="#0A2A5E"/>
    <circle cx="120" cy="120" r="9" fill="#0A2A5E"/>
    <circle cx="44" cy="75" r="6.5" fill="#48CAE4"/>
    <circle cx="96" cy="75" r="6.5" fill="#48CAE4"/>
  </g>

  <!-- Wordmark -->
  <text x="195" y="100" font-size="72" font-weight="800" letter-spacing="2" fill="#0A2A5E">APSE</text>
  <text x="197" y="132" font-size="14.5" font-weight="600" letter-spacing="1.4" fill="#5A6B7B">ALPHA PROCESS &amp; SYSTEM ENGINEERING</text>
</svg>
