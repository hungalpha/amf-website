<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" width="520" height="200" font-family="Montserrat, 'Segoe UI', Arial, sans-serif">
  <!-- CONCEPT 1: Alpha (α) cách điệu thành dòng process-flow + node -->
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00B4D8"/>
      <stop offset="1" stop-color="#0077B6"/>
    </linearGradient>
  </defs>

  <!-- Icon: chữ alpha vẽ như đường ống dòng chảy -->
  <g transform="translate(20,30)" fill="none" stroke-linecap="round">
    <!-- thân alpha = process flow -->
    <path d="M30 30
             C 5 35, 5 105, 32 110
             C 60 113, 70 70, 78 45
             C 84 28, 96 20, 108 38
             C 118 53, 110 95, 122 110"
          stroke="#0A2A5E" stroke-width="14"/>
    <path d="M30 30
             C 5 35, 5 105, 32 110
             C 60 113, 70 70, 78 45
             C 84 28, 96 20, 108 38
             C 118 53, 110 95, 122 110"
          stroke="url(#g1)" stroke-width="6"/>
    <!-- nodes hệ thống -->
    <circle cx="30" cy="30" r="9" fill="#00B4D8" stroke="none"/>
    <circle cx="122" cy="110" r="9" fill="#0A2A5E" stroke="none"/>
    <circle cx="32" cy="110" r="6" fill="#48CAE4" stroke="none"/>
  </g>

  <!-- Wordmark -->
  <text x="185" y="105" font-size="74" font-weight="800" letter-spacing="2" fill="#0A2A5E">APSE</text>
  <text x="187" y="138" font-size="15.5" font-weight="600" letter-spacing="1.5" fill="#5A6B7B">ALPHA PROCESS &amp; SYSTEM ENGINEERING</text>
</svg>
