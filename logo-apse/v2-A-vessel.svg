<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 200" width="560" height="200" font-family="'Arial Black', Montserrat, Arial, sans-serif">
  <!-- V2-A: Chữ A với thanh ngang là BỒN ÁP LỰC (pressure vessel) trên bệ đỡ saddle -->
  <g transform="translate(24,20)">
    <!-- hai chân chữ A -->
    <path d="M70 6 L20 150 L46 150 L86 38 Z" fill="#22303A"/>
    <path d="M70 6 L120 150 L94 150 L70 38 Z" fill="#22303A"/>
    <!-- BỒN ÁP LỰC nằm ngang = thanh ngang chữ A -->
    <g>
      <rect x="34" y="92" width="72" height="30" rx="15" fill="#C8102E"/>
      <!-- dished head highlight -->
      <ellipse cx="42" cy="107" rx="6" ry="14" fill="#9c0c22"/>
      <ellipse cx="98" cy="107" rx="6" ry="14" fill="#e23b54"/>
      <!-- mối hàn dọc -->
      <line x1="70" y1="93" x2="70" y2="121" stroke="#9c0c22" stroke-width="2.5"/>
      <!-- nozzle nhỏ trên đỉnh bồn -->
      <rect x="66" y="84" width="8" height="9" fill="#C8102E"/>
    </g>
    <!-- bệ đỡ saddle -->
    <path d="M40 122 L50 122 L54 132 L36 132 Z" fill="#5A6B73"/>
    <path d="M90 122 L100 122 L104 132 L86 132 Z" fill="#5A6B73"/>
  </g>

  <text x="170" y="100" font-size="68" font-weight="900" letter-spacing="1" fill="#22303A">APSE</text>
  <text x="172" y="132" font-size="13.5" font-weight="700" letter-spacing="1.3" fill="#6B7A82">ALPHA PROCESS &amp; SYSTEM ENGINEERING</text>
</svg>
