<!DOCTYPE html>
<html lang="vi"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APSE v4</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">
<style>
  body{margin:0;font-family:Poppins,Arial,sans-serif;background:#eef1f4}
  .bar{background:#1C75BC;color:#fff;padding:22px 36px}
  .bar h1{margin:0;font-size:20px}
  .wrap{max-width:760px;margin:30px auto;padding:0 20px}
  .card{background:#fff;border:1px solid #dde3ea;border-radius:14px;margin-bottom:24px;overflow:hidden}
  .card h2{margin:0;padding:14px 20px;font-size:14px;background:#fafbfc;border-bottom:1px solid #eef1f5;color:#1C75BC}
  .p{display:flex;align-items:center;justify-content:center;padding:34px}
  .light{background:#fff}.dark{background:#16395f}.grey{background:#f4f6f9}
  .p img{width:100%;max-width:430px}
  .row{display:flex;flex-wrap:wrap}.row>div{flex:1;min-width:260px}
  .icon img{max-width:130px}
</style></head>
<body>
<div class="bar"><h1>APSE — Logo v4 (2 chữ A tam giác · A cam = shadow · Blue Alpha ECC)</h1></div>
<div class="wrap">
  <div class="card"><h2>Bản chính</h2>
    <div class="row">
      <div class="p light"><img src="v4-final.svg"></div>
      <div class="p dark"><img src="v4-final.svg" style="filter:brightness(0) invert(1)"></div>
    </div>
  </div>
  <div class="card"><h2>Trên nền xám / tài liệu</h2>
    <div class="p grey"><img src="v4-final.svg"></div>
  </div>
</div>
</body></html>
